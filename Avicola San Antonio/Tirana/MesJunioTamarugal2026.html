<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Turnos · Junio 2026 · Avícola San Antonio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --rojo:#D21F26;
  --amarillo:#FFD100;
  --bg:#fffaf0;
  --texto:#161616;
  --muted:#6b7280;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--texto);
  font-family:'Inter',system-ui,Segoe UI,Roboto,Arial,sans-serif;
}
.topbar{
  width:100%;
  background:var(--rojo);
  padding:10px 14px;
  position:relative;
  z-index:5;
}
.topbar .inner{
  max-width:980px;
  margin:0 auto;
  display:flex;
  align-items:center;
  gap:12px;
}
.topbar img.logo{
  height:54px;
  width:auto;
  display:block;
  object-fit:contain;
}
.container{
  max-width:860px;
  margin:0 auto;
  padding:18px;
}
.card{
  background:#ffffff;
  border-radius:18px;
  padding:18px 18px 16px 18px;
  box-shadow:0 18px 45px rgba(15,23,42,.18);
  margin-bottom:18px;
}
.label{
  font-size:.9rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--muted);
  margin-bottom:6px;
  font-weight:600;
}
h1{
  margin:0 0 4px 0;
  font-size:1.4rem;
}
.subtitle{
  color:var(--muted);
  font-size:.9rem;
  margin-bottom:12px;
}
.input{
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #d1d5db;
  font-size:1.1rem;
  font-weight:600;
  letter-spacing:.3em;
  text-align:center;
}
button{
  margin-top:10px;
  width:100%;
  border:none;
  border-radius:999px;
  padding:10px 14px;
  font-size:1rem;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(135deg,var(--rojo),#ff6b35);
  color:#ffffff;
  box-shadow:0 10px 25px rgba(220,38,38,.45);
  transition:transform .08s ease,box-shadow .08s ease,opacity .2s;
}
button:hover{ transform:translateY(-1px); box-shadow:0 16px 40px rgba(220,38,38,.5); }
.footer{
  margin-top:10px;
  font-size:.8rem;
  color:var(--muted);
  text-align:center;
}
.table-wrap{
  overflow-x:auto;
  margin-top:10px;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:.85rem;
}
thead{ background:#f9fafb; }
th,td{
  padding:6px 8px;
  border-bottom:1px solid #e5e7eb;
  text-align:left;
}
th{
  font-size:.75rem;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:#6b7280;
}
tbody tr:nth-child(even){ background:#f9fafb; }
.row:hover{ background:#eef2ff; }
.day{ color:var(--muted); }
.chip{
  display:inline-block;
  padding:6px 10px;
  border-radius:20px;
  font-size:.85rem;
  font-weight:800;
}
.chip-t{ background:#d1fae5; color:#065f46; }
.chip-l{ background:#fee2e2; color:#991b1b; }
.legend{ margin-top:10px; color:var(--muted); font-size:.9rem; }
.legend .chip{ margin-left:6px; }
.actions button{ margin-top: 15px; background: #4b5563; }

@media print{
  .topbar, .actions, .input, .legend, button, .label{ display:none !important; }
  .card{ border:none; box-shadow:none; }
  body{ background:#ffffff; }
}
</style>
</head>
<body>
<div class="topbar">
  <div class="inner">
    <img class="logo" src="logo.webp" alt="Avícola San Antonio">
  </div>
</div>

<main class="container">
  <section class="card">
    <div class="label">Ingresa tu código personal</div>
    <input id="code" class="input" type="tel" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" placeholder="0000"/>
    <button id="buscar">Ver mi turno de Junio</button>
    <div id="msg" class="footer" style="margin:8px 0 0 0;"></div>
  </section>

  <div id="result"></div>

  <div class="footer">© Avícola San Antonio · Junio 2026.</div>
</main>

<script>
const APP = {
  month: 6, // JUNIO
  year: 2026,
  daysInMonth: 30,
  // Base de datos exacta, respetando el orden literal de las filas del Excel sin reordenar
  data: {
    // === FILAS 3 A LA 19 ===
    "7101": { cargo: "Operador S1", nombre: "Angela Montaño", turnos: "TTTTTLLTTTTTLTTTTTTLLTTTTTLTTT" },
    "7123": { cargo: "Backup S1", nombre: "Luis Rosseau", turnos: "LLTTTTTTLTTTTTLLTTTTTTLTTTTTLL" },
    "7102": { cargo: "Operador S2", nombre: "Felipe Gomez", turnos: "LTLTTTTTTLTTTTLTLTTTTTTLTTTTLT" },
    "7103": { cargo: "Operador S3", nombre: "Esteban Martinez", turnos: "LTLTTTTTTLTTTTLTLTTTTTTLTTTTLT" },
    "7104": { cargo: "Operador S4", nombre: "David Alarcon", turnos: "LTTLTTTTTTLTTTLTTLTTTTTTLTTTLT" },
    "7105": { cargo: "Operador S5", nombre: "Ramón Gutierrez", turnos: "LTTLTTTTTTLTTTLTTLTTTTTTLTTTLT" },
    "7124": { cargo: "Backup S2", nombre: "Santiago Perez", turnos: "TTTTLTTLTTTLTTTTTTLTTLTTTLTTTT" },
    "7106": { cargo: "Operador S6", nombre: "Carlos Diaz", turnos: "TTTTLTTLTTTLTTTTTTLTTLTTTLTTTT" },
    "7107": { cargo: "Operador S7", nombre: "Juan Muñoz", turnos: "TTTTTLTLTTTTLTTTTTTLTLTTTTLTTT" },
    "7108": { cargo: "Operador S8", nombre: "Pedro Rojas", turnos: "TTTLTTTLTTTTLTTTTTTLTLTTTTLTTT" },
    "7109": { cargo: "Operador S9", nombre: "Miguel Silva", turnos: "TLTTTTTLTTTTTLTTTTTTLLTTTTTLTT" },
    "7110": { cargo: "Operador S10", nombre: "Jorge Contreras", turnos: "TTLTTTTLTTTTTLTTTTTTLLTTTTTLTT" },
    "7111": { cargo: "Operador S11", nombre: "Luis Sepulveda", turnos: "LTTTTTTLTTTTTTLTTTTTTLTTTTTLTT" },
    "7112": { cargo: "Operador S12", nombre: "Manuel Morales", turnos: "LTTTTTTLTTTTTTLTTTTTTLTTTTTLTT" },
    "7113": { cargo: "Operador S13", nombre: "José Rodriguez", turnos: "TTTLTTTLTTTTLTTTTTTLTLTTTTLTTT" },
    "7116": { cargo: "Líder S1", nombre: "Alvaro Fuentes", turnos: "LTTTTTTLTTTTTTLTTTTTTLTTTTTLTT" },
    "7117": { cargo: "Líder S2", nombre: "Neidy Gonzales", turnos: "TTTTLLTTTLLTTTTTLLTTTLLTTTTTLL" },

    // === FILAS 24 A LA 25 ===
    "7114": { cargo: "Operador A1", nombre: "Fausto Rios", turnos: "LTTTTTTLTTTTTTLTTTTTTLTTTTTLTT" },
    "7115": { cargo: "Operador A2", nombre: "Andrés Castro", turnos: "LTTTTTTLTTTTTTLTTTTTTLTTTTTLTT" },

    // === FILAS 32 A LA 35 ===
    "7118": { cargo: "Operador G1", nombre: "Gabriel Espinoza", turnos: "LTTTTTLTTTTTTLLTTTTTLLTTTTTLLT" },
    "7119": { cargo: "Operador G2", nombre: "Ricardo Valenzuela", turnos: "LTTTLTTTTTTLTTLTTTLTTLTTTLTTLT" },
    "7120": { cargo: "Operador G3", nombre: "Raúl Jimenez", turnos: "TTTTLTTTTTLLTTTTTLLTTTTTLLTTLL" },
    "7121": { cargo: "Operador G4", nombre: "Arturo Palma", turnos: "LTTTTTLTTTTTTLLTTTTTLLTTTTTLLT" }
  }
};

const WEEKDAYS = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];

function formatDate(d){
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth()+1).padStart(2,"0");
  return `${dd}/${mm}`;
}

function buildTable(code){
  const item = APP.data[code];
  const pattern = item.turnos;

  let html = `
  <section class="card">
    <div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px;">
      <div>
        <h1>${item.cargo} · ${item.nombre}</h1>
        <div class="subtitle">Mes: Junio ${APP.year} (30 días)</div>
      </div>
      <div style="font-weight:bold; color:var(--rojo); min-width:70px; text-align:right;">Cód: ${code}</div>
    </div>
    <div class="legend">
      Leyenda: <span class="chip chip-t">T = TRABAJA</span> <span class="chip chip-l">L = LIBRE</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>N°</th><th>Fecha</th><th>Día</th><th>Estado</th></tr>
        </thead>
        <tbody>
  `;

  for(let i=0; i < APP.daysInMonth; i++){
    const day = new Date(APP.year, APP.month - 1, i + 1);
    const estado = pattern[i] || "L";
    const chip = (estado === "T")
      ? '<span class="chip chip-t">TRABAJA</span>'
      : '<span class="chip chip-l">LIBRE</span>';
    html += `
      <tr class="row">
        <td>${i+1}</td>
        <td>${formatDate(day)}</td>
        <td class="day">${WEEKDAYS[day.getDay()]}</td>
        <td>${chip}</td>
      </tr>`;
  }

  html += `
        </tbody>
      </table>
    </div>
    <div class="actions">
      <button onclick="window.print()">Imprimir / Guardar PDF</button>
    </div>
  </section>`;

  return html;
}

document.getElementById("buscar").addEventListener("click", () => {
  const code = document.getElementById("code").value.trim();
  const msg = document.getElementById("msg");
  const result = document.getElementById("result");

  msg.textContent = "";
  result.innerHTML = "";

  if (!APP.data[code]){
    msg.textContent = "Código no encontrado. Verifique su número.";
    return;
  }

  result.innerHTML = buildTable(code);
});
</script>
</body>
</html>
