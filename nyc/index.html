<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NYC Street English Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff4500">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/197/197484.png">
    
    <style>
        :root {
            --ny-orange: #ff4500;
            --ny-blue: #00d4ff;
            --dark-bg: #0f0f0f;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b1b1b1;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        #main-app {
            width: 100%;
            max-width: 500px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--ny-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            cursor: pointer;
            font-size: 2rem;
        }

        .subtitle {
            color: var(--ny-orange);
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .item {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 30px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .item:hover {
            border-color: var(--ny-blue);
            background: #252525;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.2);
        }

        .item .icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .item .name {
            font-weight: bold;
            font-size: 0.8rem;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .full {
            grid-column: span 2;
            border: 1px solid var(--ny-orange);
            background: linear-gradient(145deg, #1e1e1e, #251005);
        }

        .back-area {
            width: 100%;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--ny-blue);
            color: var(--ny-blue);
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .back-btn:active {
            background: var(--ny-blue);
            color: black;
        }

        .cred-badge {
            color: var(--ny-orange);
            font-size: 1rem;
            font-weight: 800;
            border: 1px solid var(--ny-orange);
            padding: 8px 15px;
            border-radius: 50px;
        }

        .verse-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 6px solid var(--ny-orange);
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .eng {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--ny-blue);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .pro {
            font-size: 1rem;
            color: var(--ny-orange);
            margin-bottom: 8px;
            font-weight: 600;
            font-style: italic;
            white-space: normal;
            line-height: 1.4;
        }

        .esp {
            font-size: 1.05rem;
            color: var(--text-sub);
            line-height: 1.5;
        }

        #game-container {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            min-height: 400px;
            border: 2px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .tf-btn {
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            border-radius: 15px;
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .v-btn { background: #00c853; color: white; }
        .f-btn { background: #d50000; color: white; }

        /* PESTAÑA CORPORATIVA GLASSMORPHISM */
        #install-banner {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(25, 25, 25, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--ny-orange);
            padding: 25px;
            border-radius: 30px;
            z-index: 10000;
            width: 88%;
            max-width: 420px;
            flex-direction: column;
            box-shadow: 0 25px 60px rgba(0,0,0,1);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { bottom: -200px; opacity: 0; }
            to { bottom: 30px; opacity: 1; }
        }

        .close-banner {
            position: absolute;
            top: 15px;
            right: 20px;
            color: var(--text-sub);
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="main-app">
        <header id="header">
            <h1 onclick="location.reload()">Street English</h1>
            <div class="subtitle">NYC Master Challenge</div>
        </header>

        <nav id="nav-bar" class="back-area hidden">
            <button class="back-btn" onclick="handleBack()">← VOLVER</button>
            <div class="cred-badge">CRED: <span id="cred-score">0</span></div>
        </nav>

        <main id="view-categories" class="grid">
            <div class="item full" onclick="startChallenge()">
                <span class="icon">🎮</span>
                <span class="name" style="color:#fff; font-size:1.1rem; letter-spacing: 2px;">STREET CHALLENGE</span>
            </div>
            
            <div class="item" onclick="showArtists()">
                <span class="icon">🎙️</span>
                <span class="name">Playlist</span>
            </div>

            <div class="item" onclick="showCategory('reactions')">
                <span class="icon">🔥</span>
                <span class="name">Reactions</span>
            </div>

            <div class="item" onclick="showCategory('danger')">
                <span class="icon">⚠️</span>
                <span class="name">Danger</span>
            </div>

            <div class="item" onclick="showCategory('money')">
                <span class="icon">💰</span>
                <span class="name">Money</span>
            </div>

            <div class="item" onclick="showCategory('bodega')">
                <span class="icon">🥪</span>
                <span class="name">Bodega</span>
            </div>

            <div class="item" onclick="showCategory('subway')">
                <span class="icon">🚇</span>
                <span class="name">Subway</span>
            </div>

            <div class="item full" onclick="showCategory('slang')">
                <span class="icon">🗽</span>
                <span class="name">Dictionary A-Z</span>
            </div>
        </main>

        <section id="view-content" class="hidden"></section>

        <section id="view-game" class="hidden">
            <div id="game-container"></div>
        </section>
    </div>

    <div id="install-banner">
        <button class="close-banner" onclick="this.parentElement.style.display='none'">✕</button>
        <div style="text-align:center;">
            <div style="font-size: 3.5rem; margin-bottom: 15px;">🗽</div>
            <h3 style="margin: 0; color:var(--ny-blue); font-size: 1.5rem;">NYC Street English</h3>
            <p style="color:var(--text-sub); font-size: 0.95rem; margin-top: 10px; margin-bottom: 25px; line-height: 1.5;">
                ¿Quieres estudiar sin conexión?<br>Instala la App en tu pantalla de inicio.
            </p>
            <button id="btn-install-now" style="background:var(--ny-orange); color:white; padding:18px; border-radius:18px; border:none; font-weight:bold; width:100%; cursor:pointer; font-size: 1.1rem; text-transform: uppercase; box-shadow: 0 10px 20px rgba(255,69,0,0.3);">
                INSTALAR AHORA
            </button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    
    <script>
        // Registro del Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA: Service Worker Activo'))
                    .catch(err => console.log('PWA: Error de registro', err));
            });
        }
    </script>

</body>
</html>
