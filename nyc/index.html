<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NYC Street English Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff4500">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/197/197484.png">
    <style>
        :root { --ny-orange: #ff4500; --ny-blue: #00d4ff; --dark-bg: #0f0f0f; --card-bg: #1e1e1e; --text-main: #ffffff; --text-sub: #b1b1b1; }
        body { background-color: var(--dark-bg); color: var(--text-main); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; touch-action: manipulation; }
        #main-app { width: 100%; max-width: 500px; }
        h1 { color: var(--ny-blue); text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0; cursor: pointer; }
        .subtitle { color: var(--ny-orange); text-align: center; font-weight: bold; font-size: 0.8rem; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item { background: var(--card-bg); border: 1px solid #333; border-radius: 15px; padding: 25px 10px; text-align: center; cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .item:hover { transform: translateY(-3px); border-color: var(--ny-blue); background: #252525; }
        .item .icon { font-size: 2.2rem; margin-bottom: 10px; }
        .item .name { font-weight: bold; font-size: 0.75rem; color: var(--text-main); text-transform: uppercase; }
        .full { grid-column: span 2; border: 1px solid var(--ny-orange); }
        .back-area { width: 100%; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { background: none; border: 1px solid var(--ny-blue); color: var(--ny-blue); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .cred-badge { color: var(--ny-orange); font-size: 0.9rem; font-weight: 800; }
        #game-container { background: var(--card-bg); border-radius: 20px; padding: 25px; text-align: center; min-height: 350px; border: 2px solid #333; }
        .q-text { font-size: 1.3rem; font-weight: bold; margin-bottom: 20px; color: white; }
        .drop-zone { border: 2px dashed var(--ny-blue); padding: 25px; margin: 20px 0; border-radius: 12px; min-height: 60px; color: var(--ny-blue); font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .drop-zone.over { background: rgba(0, 212, 255, 0.2); border-style: solid; }
        .options-flex { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 25px; }
        .drag-item { background: var(--ny-blue); color: black; padding: 12px 18px; border-radius: 8px; font-weight: 800; cursor: grab; user-select: none; }
        .tf-btn { width: 100%; padding: 18px; margin: 12px 0; border-radius: 12px; border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .v-btn { background: #00c853; color: white; }
        .f-btn { background: #d50000; color: white; }
        .verse-card { background: var(--card-bg); border-radius: 12px; padding: 18px; margin-bottom: 15px; border-left: 5px solid var(--ny-orange); cursor: pointer; animation: slideIn 0.3s ease-out; }
        .eng { font-size: 1.15rem; font-weight: 800; color: var(--ny-blue); margin-bottom: 6px; }
        .pro { font-size: 0.95rem; color: var(--ny-orange); margin-bottom: 6px; font-weight: 600; font-style: italic; }
        .esp { font-size: 1rem; color: var(--text-sub); line-height: 1.4; }
        .audio-hint { font-size: 0.7rem; color: #666; text-align: right; margin-top: 8px; font-weight: bold; }
        .hidden { display: none !important; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
    <div id="main-app">
        <div id="header"><h1 onclick="location.reload()">Street English</h1><div class="subtitle">NYC MASTER EDITION V.FINAL</div></div>
        
        <div id="nav-bar" class="back-area hidden">
            <button class="back-btn" onclick="handleBack()">← VOLVER</button>
            <div class="cred-badge">STREET CRED: <span id="cred-score">0</span></div>
        </div>

        <div id="view-categories" class="grid">
            <div class="item full" style="background: linear-gradient(45deg, #ff4500, #ff8c00); border:none;" onclick="startChallenge()">
                <span class="icon">🎮</span><span class="name" style="color:black; font-size:1.1rem;">STREET CHALLENGE</span>
            </div>
            <div class="item" onclick="showArtists()"><span class="icon">🎙️</span><span class="name">THE PLAYLIST</span></div>
            <div class="item" onclick="showCategory('reactions')"><span class="icon">🔥</span><span class="name">REACTIONS</span></div>
            <div class="item" onclick="showCategory('danger')"><span class="icon">⚠️</span><span class="name">DANGER</span></div>
            <div class="item" onclick="showCategory('money')"><span class="icon">💰</span><span class="name">MONEY</span></div>
            <div class="item" onclick="showCategory('bodega')"><span class="icon">🥪</span><span class="name">BODEGA</span></div>
            <div class="item" onclick="showCategory('subway')"><span class="icon">🚇</span><span class="name">SUBWAY</span></div>
            <div class="item full" onclick="showCategory('slang')"><span class="icon">🗽</span><span class="name">STREET DICTIONARY A-Z</span></div>
        </div>

        <div id="view-artists" class="grid hidden"></div>
        <div id="view-songs" class="grid hidden"></div>
        <div id="view-lyrics" class="hidden"></div>
        <div id="view-game" class="hidden">
            <div id="game-container"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA: Service Worker registrado con éxito'))
                    .catch(err => console.log('PWA: Error al registrar el Service Worker', err));
            });
        }
    </script>
</body>
</html>
